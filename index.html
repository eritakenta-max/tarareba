<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>タラレバ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#c8bfaa;font-family:'Noto Sans JP','Hiragino Sans',sans-serif;-webkit-text-size-adjust:100%}
#root{height:100%;display:flex;justify-content:center}
button{cursor:pointer;border:none;outline:none;font-family:inherit;-webkit-tap-highlight-color:transparent}
textarea,input{font-family:inherit;outline:none;-webkit-appearance:none}
::-webkit-scrollbar{width:0;background:transparent}
.shell{width:100%;max-width:430px;min-height:100dvh;min-height:100vh;background:#FDF6E3;display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen{flex:1;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
.setup-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;gap:22px}
.setup-emoji{font-size:72px;text-align:center;line-height:1}
.setup-h{font-size:26px;font-weight:900;color:#0F172A;text-align:center}
.setup-p{font-size:13px;color:#94a3b8;text-align:center;line-height:1.7}
.f-group{width:100%;display:flex;flex-direction:column;gap:7px}
.f-label{font-size:13px;font-weight:700;color:#0F172A}
.f-input{width:100%;padding:14px 16px;border-radius:16px;border:2px solid rgba(15,23,42,.14);background:#fff;font-size:16px;color:#0F172A;transition:border-color .2s}
.f-input:focus{border-color:#EAB308}
.f-hint{font-size:11px;color:#94a3b8;margin-top:2px}
.btn-primary{width:100%;padding:16px;border-radius:20px;font-size:16px;font-weight:900;background:#EAB308;color:#0F172A;transition:transform .1s,opacity .1s}
.btn-primary:active{transform:scale(.96)}
.btn-primary:disabled{opacity:.35;pointer-events:none}
.home-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:44px 22px 28px}
.home-topbar{width:100%;display:flex;justify-content:space-between;align-items:center}
.pill-btn{font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;border:2px solid #0F172A;color:#0F172A;background:transparent}
.question-card{width:100%;border-radius:24px;padding:18px 20px;background:#fff8e8;border:2px solid rgba(234,179,8,.22);text-align:center}
.question-card h2{font-size:19px;font-weight:900;color:#0F172A;margin-bottom:4px}
.question-card p{font-size:12px;color:#94a3b8}
.goal-chip{font-size:12px;color:#0F172A;text-align:center;background:#fff;border-radius:99px;padding:5px 14px;border:1.5px solid rgba(234,179,8,.4)}
.emotion-grid{display:flex;gap:10px;width:100%;justify-content:center}
.ebtn{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:22px;box-shadow:0 6px 20px rgba(0,0,0,.11);transition:transform .1s;padding:14px 0;flex:1}
.ebtn:active{transform:scale(.92)}
.ebtn .eico{font-size:36px;line-height:1;margin-bottom:3px}
.ebtn .elbl{font-size:17px;font-weight:900;margin-bottom:2px}
.ebtn .esub{font-size:9px;font-weight:500;text-align:center;padding:0 4px;line-height:1.3;opacity:.75}
.home-hint{font-size:11px;color:#94a3b8;text-align:center}
.plant-box{text-align:center}
.plant-emoji{font-size:56px;line-height:1;display:block}
.plant-lv{font-size:11px;font-weight:700;margin-top:4px;color:#EAB308}
.plant-pct{font-size:13px;color:#0F172A;font-weight:700;margin-top:1px}
.pbar-wrap{width:100%;height:8px;border-radius:99px;background:rgba(15,23,42,.08);margin-top:6px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#EAB308,#f59e0b);transition:width 1s ease}
.inner{flex:1;padding:30px 20px;display:flex;flex-direction:column}
.back-btn{font-size:13px;font-weight:700;color:#0F172A;background:transparent;text-align:left;margin-bottom:22px;display:inline-block}
.scr-h{font-size:23px;font-weight:900;color:#0F172A;text-align:center;margin-bottom:5px}
.scr-sub{font-size:12px;color:#94a3b8;text-align:center;margin-bottom:18px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.cat-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;height:92px;border-radius:20px;border:2px solid rgba(15,23,42,.11);background:#fff;transition:all .15s}
.cat-btn:active{transform:scale(.94)}
.cat-btn.sel{border-color:#EAB308;background:#fff8e8}
.cat-ico{font-size:30px;line-height:1;margin-bottom:4px}
.cat-lbl{font-size:13px;font-weight:700;color:#0F172A}
.reason-list{display:flex;flex-direction:column;gap:11px}
.rbtn{width:100%;padding:16px;border-radius:18px;border:2px solid rgba(15,23,42,.18);background:#fff;font-size:15px;font-weight:700;color:#0F172A;transition:all .15s}
.rbtn:active{transform:scale(.96)}
.rbtn.sel{background:#0F172A;color:#fff;border-color:#0F172A}
.amt-screen{flex:1;background:#0F172A;display:flex;flex-direction:column;padding:28px 20px 24px}
.amt-back{font-size:13px;font-weight:700;color:#64748b;background:transparent;text-align:left;margin-bottom:16px}
.amt-tag{text-align:center;font-size:13px;color:#64748b;margin-bottom:12px}
.amt-display{text-align:center;padding:20px 0 18px;border-bottom:2.5px solid #EAB308;margin-bottom:18px}
.amt-num{font-size:50px;font-weight:900;color:#EAB308;letter-spacing:-1px}
.numpad{display:flex;flex-direction:column;gap:9px;flex:1}
.nrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.nkey{padding:17px 0;border-radius:17px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-size:22px;font-weight:700;color:#fff;transition:transform .1s}
.nkey:active{transform:scale(.9);background:rgba(255,255,255,.13)}
.nkey.kdel{color:#94a3b8}
.nkey.kempty{background:transparent;border:none;pointer-events:none}
.ok-btn{width:100%;padding:17px;border-radius:19px;font-size:17px;font-weight:900;background:#EAB308;color:#0F172A;margin-top:13px;transition:transform .1s}
.ok-btn:active{transform:scale(.96)}
.ok-btn:disabled{background:rgba(255,255,255,.07);color:rgba(255,255,255,.2);pointer-events:none}
.cpl-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:36px 24px 28px;gap:18px}
.cpl-ico{font-size:68px;text-align:center;line-height:1}
.cpl-h{font-size:22px;font-weight:900;color:#0F172A;text-align:center}
.cpl-sub{font-size:13px;color:#94a3b8;text-align:center;margin-top:2px}
.memo-card{width:100%;border-radius:22px;padding:18px;background:#fff8e8;border:2px solid rgba(234,179,8,.2)}
.memo-lbl{font-size:13px;font-weight:700;color:#0F172A;margin-bottom:9px}
.memo-ta{width:100%;padding:12px;border-radius:14px;border:2px solid rgba(15,23,42,.1);background:#fff;font-size:14px;color:#0F172A;resize:none;line-height:1.55}
.memo-ta:focus{border-color:#EAB308}
.memo-saved{font-size:12px;color:#22c55e;font-weight:700;text-align:center;margin-top:6px;min-height:18px}
.btn-navy{width:100%;padding:14px;border-radius:16px;background:#0F172A;color:#fff;font-size:14px;font-weight:700;margin-top:9px;transition:transform .1s}
.btn-navy:active{transform:scale(.96)}
.ach-card{width:100%;border-radius:22px;padding:18px;background:#fff;border:1px solid rgba(15,23,42,.06);box-shadow:0 2px 10px rgba(0,0,0,.04);text-align:center}
.ach-goalname{font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:3px}
.ach-big{font-size:50px;font-weight:900;color:#0F172A;line-height:1}
.home-btn{width:100%;padding:16px;border-radius:20px;font-size:15px;font-weight:900;background:#EAB308;color:#0F172A;transition:transform .1s}
.home-btn:active{transform:scale(.96)}
.rep-body{flex:1;display:flex;flex-direction:column;padding:28px 20px 32px}
.rep-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.rep-h{font-size:22px;font-weight:900;color:#0F172A;text-align:center;margin-bottom:14px}
.heart-area{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:16px}
.heart-legend{display:flex;gap:20px;font-size:13px;font-weight:700}
.sum-card{width:100%;border-radius:20px;padding:16px;background:#fff;border:1px solid rgba(15,23,42,.06);margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0}
.sum-row+.sum-row{border-top:1px solid rgba(15,23,42,.06)}
.sum-row span:first-child{font-size:13px;color:#64748b}
.sum-row span:last-child{font-size:15px;font-weight:900}
.hist-h{font-size:15px;font-weight:700;color:#0F172A;margin-bottom:11px}
.hist-list{display:flex;flex-direction:column;gap:10px}
.hitem{border-radius:16px;padding:14px;background:#fff;border:1px solid rgba(15,23,42,.06);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.hitem-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hbadge{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700}
.hamt{font-size:17px;font-weight:900}
.hmeta{display:flex;gap:6px;flex-wrap:wrap}
.hmeta span{font-size:11px;color:#94a3b8;background:rgba(15,23,42,.05);padding:2px 8px;border-radius:99px}
.hmemo{font-size:12px;color:#64748b;margin-top:7px;padding-top:7px;border-top:1px dashed rgba(15,23,42,.1);line-height:1.55}
.empty-msg{text-align:center;padding:28px;color:#94a3b8;font-size:14px}
.reset-btn{width:100%;margin-top:24px;padding:14px;border-radius:18px;background:#fff;border:2px solid rgba(239,68,68,.3);color:#ef4444;font-size:14px;font-weight:700;transition:transform .1s}
.reset-btn:active{transform:scale(.96)}
.next-goal-btn{width:100%;padding:15px;border-radius:20px;font-size:15px;font-weight:900;background:linear-gradient(135deg,#EAB308,#f59e0b);color:#0F172A;margin-bottom:10px;box-shadow:0 4px 14px rgba(234,179,8,.35);transition:transform .1s}
.next-goal-btn:active{transform:scale(.96)}
.acv-section{margin-top:22px}
.acv-h{font-size:15px;font-weight:700;color:#0F172A;margin-bottom:11px}
.acv-item{border-radius:16px;padding:13px 14px;background:linear-gradient(135deg,#fff8e8,#fffdf5);border:1.5px solid rgba(234,179,8,.3);box-shadow:0 1px 4px rgba(0,0,0,.04);display:flex;align-items:center;gap:10px;margin-bottom:9px}
.acv-ico{font-size:28px;line-height:1;flex-shrink:0}
.acv-info{flex:1;min-width:0}
.acv-name{font-size:14px;font-weight:700;color:#0F172A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acv-meta{font-size:11px;color:#94a3b8;margin-top:2px}
.acv-amt{font-size:15px;font-weight:900;color:#EAB308;white-space:nowrap}
.acv-del{font-size:18px;background:transparent;color:#cbd5e1;padding:4px 6px;border-radius:8px;flex-shrink:0;transition:color .15s}
.acv-del:active{color:#ef4444}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease forwards}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const NAVY='#0F172A',YELLOW='#EAB308';
const LS_KEY='tarareba_v1';
const CATS=[
  {id:'drinking',label:'飲み会',ico:'🍺'},
  {id:'eating',label:'外食',ico:'🍽️'},
  {id:'entertain',label:'娯楽',ico:'🎰'},
  {id:'shopping',label:'買い物',ico:'🛒'},
  {id:'transport',label:'交通費',ico:'🚕'},
  {id:'beauty',label:'美容',ico:'💄'},
  {id:'cafe',label:'カフェ',ico:'☕'},
  {id:'other',label:'その他',ico:'📦'},
];
const CAT_MAP=Object.fromEntries(CATS.map(c=>[c.id,c]));
const REASONS=['付き合い・ノリ','誘惑に負けた','見栄（みえ）','なんとなく'];
const PLANT_STAGES=[
  {min:0,max:4,emo:'🫘',lv:'たね',msg:'まだ芽が出ていない...'},
  {min:5,max:9,emo:'🌱',lv:'発芽',msg:'小さな芽が顔を出した！'},
  {min:10,max:14,emo:'🌿',lv:'小さな葉',msg:'双葉が開いてきた'},
  {min:15,max:19,emo:'🍃',lv:'若葉',msg:'葉っぱが増えてきた'},
  {min:20,max:24,emo:'🪴',lv:'鉢植え',msg:'しっかり根付いてきた'},
  {min:25,max:29,emo:'🌵',lv:'成長中',msg:'たくましく育ってる！'},
  {min:30,max:34,emo:'🌾',lv:'穂が出た',msg:'実りの予感がしてきた'},
  {min:35,max:39,emo:'🎋',lv:'竹のよう',msg:'すくすく伸びてる！'},
  {min:40,max:44,emo:'🌲',lv:'針葉樹',msg:'大きな木になってきた'},
  {min:45,max:49,emo:'🌳',lv:'広葉樹',msg:'堂々とした木に成長'},
  {min:50,max:54,emo:'🌴',lv:'南国の木',msg:'半分まで来た！すごい'},
  {min:55,max:59,emo:'🌸',lv:'開花前夜',msg:'もうすぐ花が咲きそう'},
  {min:60,max:64,emo:'🌺',lv:'ハイビスカス',msg:'鮮やかに咲いた！'},
  {min:65,max:69,emo:'🌼',lv:'元気な花',msg:'キラキラ輝いてる'},
  {min:70,max:74,emo:'🌻',lv:'ひまわり',msg:'太陽に向かって伸びてる'},
  {min:75,max:79,emo:'🌷',lv:'チューリップ',msg:'ゴールが近づいてきた'},
  {min:80,max:84,emo:'🌹',lv:'バラ',msg:'誇り高く咲き誇る！'},
  {min:85,max:89,emo:'💐',lv:'花束',msg:'もう少しで達成！'},
  {min:90,max:94,emo:'🪷',lv:'蓮の花',msg:'清らかに輝いている'},
  {min:95,max:99,emo:'🪻',lv:'開花直前！',msg:'あと少し...！頑張れ！'},
  {min:100,max:9999,emo:'🌻',lv:'完全開花🎉',msg:'目標達成！おめでとう！'},
];
function getPlantStage(p){const f=Math.floor(p);return PLANT_STAGES.find(s=>f>=s.min&&f<=s.max)||PLANT_STAGES[0];}
function HeartChart({ratio}){
  const p=Math.round(ratio*100),rp=100-p;
  return(
    <div className="heart-area">
      <svg viewBox="0 0 100 90" width="150" height="135" style={{display:'block'}}>
        <defs><linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
          <stop offset={p+'%'} stopColor={YELLOW}/>
          <stop offset={p+'%'} stopColor={NAVY}/>
        </linearGradient></defs>
        <path d="M50 85 C50 85 5 55 5 30 C5 15 17 5 30 5 C38 5 45 10 50 17 C55 10 62 5 70 5 C83 5 95 15 95 30 C95 55 50 85 50 85Z" fill="url(#hg)"/>
      </svg>
      <div className="heart-legend">
        <span style={{color:YELLOW}}>● 満足 {p}%</span>
        <span style={{color:NAVY}}>● 後悔 {rp}%</span>
      </div>
    </div>
  );
}
function CountUp({target,decimals=1}){
  const [v,setV]=useState(0),t=useRef(null);
  useEffect(()=>{
    clearInterval(t.current);let cur=0;const step=target/48;
    t.current=setInterval(()=>{cur+=step;if(cur>=target){setV(target);clearInterval(t.current);}else setV(+cur.toFixed(decimals));},22);
    return()=>clearInterval(t.current);
  },[target]);
  return <span>{v.toFixed(decimals)}%</span>;
}
function PlantBox({pct,showBar=true}){
  const s=getPlantStage(pct),bw=Math.min(100,pct);
  return(
    <div className="plant-box fade-up">
      <span className="plant-emoji">{s.emo}</span>
      <div className="plant-lv">Lv. {s.lv}</div>
      <div className="plant-pct">{s.msg}</div>
      {showBar&&<div className="pbar-wrap" style={{marginTop:8}}><div className="pbar-fill" style={{width:bw+'%'}}></div></div>}
    </div>
  );
}
function lsLoad(){try{const d=localStorage.getItem(LS_KEY);if(d)return JSON.parse(d);}catch(e){}return null;}
function lsSave(data){try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch(e){}}

function App(){
  const saved=lsLoad();
  const hasGoal=saved&&saved.goal&&saved.goal.amount>0;
  const [screen,setScreen]=useState(hasGoal?'home':'setup');
  const [goal,setGoal]=useState(saved&&saved.goal?saved.goal:{name:'',amount:0});
  const [goalIn,setGoalIn]=useState(saved&&saved.goal&&saved.goal.name?{name:saved.goal.name,amount:String(saved.goal.amount)}:{name:'',amount:''});
  const [records,setRecords]=useState(saved&&saved.records?saved.records:[]);
  const [achieved,setAchieved]=useState(saved&&saved.achieved?saved.achieved:[]);
  const [emotion,setEmotion]=useState(null);
  const [category,setCategory]=useState(null);
  const [reason,setReason]=useState(null);
  const [amtStr,setAmtStr]=useState('');
  const [memo,setMemo]=useState('');
  const [memoSaved,setMemoSaved]=useState(false);
  const [pendingId,setPendingId]=useState(null);
  const nid=useRef(saved&&saved.nid?saved.nid:10);

  function save(g,r,ac){lsSave({goal:g,records:r,achieved:ac,nid:nid.current});}
  useEffect(()=>{save(goal,records,achieved);},[goal,records,achieved]);

  const satisfiedTotal=records.filter(r=>r.emotion==='satisfied').reduce((a,b)=>a+b.amount,0);
  const regretTotal=records.filter(r=>r.emotion==='regret').reduce((a,b)=>a+b.amount,0);
  const futureTotal=records.filter(r=>r.emotion==='future').reduce((a,b)=>a+b.amount,0);
  const heartTotal=satisfiedTotal+regretTotal;
  const satisfiedRatio=heartTotal>0?satisfiedTotal/heartTotal:0.5;
  const achievePct=goal.amount>0?Math.min(999,(futureTotal/goal.amount)*100):0;
  const isAchieved=achievePct>=100;

  function doSetup(){
    if(!goalIn.name||!goalIn.amount)return;
    const g={name:goalIn.name,amount:parseInt(goalIn.amount)||0};
    setGoal(g);setScreen('home');
  }
  function startFlow(em){
    setEmotion(em);setCategory(null);setReason(null);setAmtStr('');setMemo('');setMemoSaved(false);setPendingId(null);setScreen('category');
  }
  function numpad(k){
    if(k==='DEL'){setAmtStr(a=>a.slice(0,-1));return;}
    if(amtStr.length>=7)return;
    if(amtStr===''&&k==='0')return;
    setAmtStr(a=>a+k);
  }
  function register(){
    if(!amtStr)return;
    const id=nid.current++;
    const now=new Date();
    const date=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    const rec={id,emotion,category,amount:parseInt(amtStr),reason:emotion==='regret'?reason:null,memo:'',date};
    setRecords(r=>{const nr=[...r,rec];save(goal,nr,achieved);return nr;});
    setPendingId(id);setMemo('');setMemoSaved(false);setScreen('complete');
  }
  function saveMemo(){
    if(pendingId===null)return;
    setRecords(r=>{const nr=r.map(rec=>rec.id===pendingId?{...rec,memo}:rec);save(goal,nr,achieved);return nr;});
    setMemoSaved(true);
  }
  function startNextGoal(){
    if(!window.confirm('現在の目標達成を記録して、新しい目標を設定しますか？'))return;
    const now=new Date();
    const date=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    const newAch=[{name:goal.name,amount:goal.amount,saved:futureTotal,date},...achieved].slice(0,100);
    const newRecords=records.filter(r=>r.emotion!=='future');
    const newGoal={name:'',amount:0};
    setAchieved(newAch);setRecords(newRecords);setGoal(newGoal);
    setGoalIn({name:'',amount:''});
    save(newGoal,newRecords,newAch);
    setScreen('setup');
  }
  function deleteAchieved(idx){
    setAchieved(a=>{const na=a.filter((_,i)=>i!==idx);save(goal,records,na);return na;});
  }
  function resetAll(){
    if(!window.confirm('すべてのデータをリセットしますか？\n（この操作は元に戻せません）'))return;
    localStorage.removeItem(LS_KEY);
    setRecords([]);setAchieved([]);setGoal({name:'',amount:0});setGoalIn({name:'',amount:''});
    setEmotion(null);setCategory(null);setReason(null);setAmtStr('');setMemo('');
    setMemoSaved(false);setPendingId(null);nid.current=10;setScreen('setup');
  }
  function home(){setEmotion(null);setCategory(null);setReason(null);setAmtStr('');setMemo('');setMemoSaved(false);setPendingId(null);setScreen('home');}

  const amtNum=amtStr?parseInt(amtStr):0;
  const catObj=CAT_MAP[category]||null;

  return(
    <div className="shell">
      {screen==='setup'&&(
        <div className="screen fade-up">
          <div className="setup-body">
            <div className="setup-emoji">🎯</div>
            <div>
              <p className="setup-h">目標を設定しよう</p>
              <p className="setup-p" style={{marginTop:8}}>達成したい夢を入力してください。<br/>後悔を我慢に、我慢を未来に変える旅が始まります。</p>
            </div>
            <div className="f-group">
              <label className="f-label">目標の名前</label>
              <input className="f-input" type="text" placeholder="例：開業資金、旅行、新車..."
                value={goalIn.name} onChange={e=>setGoalIn(g=>({...g,name:e.target.value}))}/>
            </div>
            <div className="f-group">
              <label className="f-label">目標金額（円）</label>
              <input className="f-input" type="number" inputMode="numeric" placeholder="例：1000000"
                value={goalIn.amount} onChange={e=>setGoalIn(g=>({...g,amount:e.target.value}))}/>
              {goalIn.amount&&<span className="f-hint">¥{parseInt(goalIn.amount||0).toLocaleString()}</span>}
            </div>
            <button className="btn-primary" onClick={doSetup} disabled={!goalIn.name||!goalIn.amount}>タラレバを始める 🚀</button>
          </div>
        </div>
      )}
      {screen==='home'&&(
        <div className="screen fade-up">
          <div className="home-body">
            <div className="home-topbar">
              <span style={{fontSize:20,fontWeight:900,color:NAVY}}>タラレバ</span>
              <button className="pill-btn" onClick={()=>setScreen('report')}>📊 レポート</button>
            </div>
            <div style={{textAlign:'center',width:'100%',padding:'0 20px'}}>
              <PlantBox pct={achievePct} showBar={true}/>
              {goal.name&&(
                <div className="goal-chip" style={{marginTop:10,display:'inline-block'}}>
                  🎯 {goal.name}：¥{goal.amount.toLocaleString()} | 達成率 {achievePct.toFixed(1)}%
                </div>
              )}
            </div>
            {isAchieved?(
              <div style={{width:'100%',textAlign:'center'}}>
                <p style={{fontSize:13,color:'#94a3b8',marginBottom:10}}>🎉 目標を達成しました！</p>
                <button className="next-goal-btn" onClick={startNextGoal}>🌟 新たな目標を設定する</button>
              </div>
            ):(
              <>
                <div className="question-card" style={{width:'100%'}}>
                  <h2>今日のあなたのお金は？</h2>
                  <p>使った気持ち、使わなかった選択をワンタップ。</p>
                </div>
                <div className="emotion-grid" style={{width:'100%'}}>
                  <button className="ebtn" style={{background:YELLOW}} onClick={()=>startFlow('satisfied')}>
                    <span className="eico">😊</span>
                    <span className="elbl" style={{color:NAVY}}>満足</span>
                    <span className="esub" style={{color:NAVY}}>いいお金の<br/>遣い方ができた！</span>
                  </button>
                  <button className="ebtn" style={{background:'#16a34a'}} onClick={()=>startFlow('future')}>
                    <span className="eico">🌱</span>
                    <span className="elbl" style={{color:'#fff'}}>未来</span>
                    <span className="esub" style={{color:'#fff'}}>我慢したお金は<br/>未来の自分へ</span>
                  </button>
                  <button className="ebtn" style={{background:NAVY}} onClick={()=>startFlow('regret')}>
                    <span className="eico">😟</span>
                    <span className="elbl" style={{color:'#fff'}}>後悔</span>
                    <span className="esub" style={{color:'#fff'}}>やってしまった...</span>
                  </button>
                </div>
                <p className="home-hint">😊 🌱 😟 をワンタップ</p>
              </>
            )}
          </div>
        </div>
      )}
      {screen==='category'&&(
        <div className="screen fade-up">
          <div className="inner">
            <button className="back-btn" onClick={home}>＜ 戻る</button>
            <p className="scr-h">何に{emotion==='future'?'使わなかった？':'使った？'}</p>
            <p className="scr-sub">カテゴリを選んでください</p>
            <div className="cat-grid">
              {CATS.map(c=>(
                <button key={c.id} className={'cat-btn'+(category===c.id?' sel':'')}
                  onClick={()=>{setCategory(c.id);if(emotion==='regret')setScreen('reason');else setScreen('amount');}}>
                  <span className="cat-ico">{c.ico}</span>
                  <span className="cat-lbl">{c.label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
      {screen==='reason'&&(
        <div className="screen fade-up">
          <div className="inner">
            <button className="back-btn" onClick={()=>setScreen('category')}>＜ 戻る</button>
            <p className="scr-h">なぜ後悔してる？</p>
            <p className="scr-sub">正直に選んでみてください</p>
            <div className="reason-list">
              {REASONS.map(r=>(
                <button key={r} className={'rbtn'+(reason===r?' sel':'')}
                  onClick={()=>{setReason(r);setScreen('amount');}}>
                  {r}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
      {screen==='amount'&&(
        <div className="screen amt-screen fade-up">
          <button className="amt-back" onClick={()=>setScreen(emotion==='regret'?'reason':'category')}>＜ 戻る</button>
          <div className="amt-tag">
            {catObj&&<span>{catObj.ico} {catObj.label}</span>}
            {reason&&<span> ・ {reason}</span>}
            {emotion==='future'&&<span> ・ 我慢した金額</span>}
          </div>
          <div className="amt-display"><span className="amt-num">¥ {amtNum.toLocaleString()}</span></div>
          <div className="numpad">
            <div className="nrow">{['1','2','3'].map(k=><button key={k} className="nkey" onClick={()=>numpad(k)}>{k}</button>)}</div>
            <div className="nrow">{['4','5','6'].map(k=><button key={k} className="nkey" onClick={()=>numpad(k)}>{k}</button>)}</div>
            <div className="nrow">{['7','8','9'].map(k=><button key={k} className="nkey" onClick={()=>numpad(k)}>{k}</button>)}</div>
            <div className="nrow">
              <button className="nkey kdel" onClick={()=>numpad('DEL')}>⌫</button>
              <button className="nkey" onClick={()=>numpad('0')}>0</button>
              <div className="nkey kempty"></div>
            </div>
          </div>
          <button className="ok-btn" onClick={register} disabled={!amtStr}>OK</button>
        </div>
      )}
      {screen==='complete'&&(
        <div className="screen fade-up">
          <div className="cpl-body">
            <div className="cpl-ico">{emotion==='satisfied'?'🌟':emotion==='future'?'🌱':'📝'}</div>
            <div>
              <p className="cpl-h">{emotion==='satisfied'?'いい使い方でした！':emotion==='future'?'我慢！未来に貯金！':'記録しました'}</p>
              <p className="cpl-sub">¥{amtNum.toLocaleString()} を登録{catObj&&<span>（{catObj.ico}{catObj.label}）</span>}</p>
            </div>
            {emotion==='future'&&(
              <div className="ach-card" style={{width:'100%'}}>
                <p className="ach-goalname">{goal.name||'目標'} 達成率</p>
                <p className="ach-big"><CountUp target={achievePct}/></p>
                <div className="pbar-wrap" style={{marginTop:8}}><div className="pbar-fill" style={{width:Math.min(100,achievePct)+'%'}}></div></div>
                <div style={{marginTop:12}}><PlantBox pct={achievePct} showBar={false}/></div>
              </div>
            )}
            <div className="memo-card" style={{width:'100%'}}>
              <p className="memo-lbl">📮 未来の自分にタラレバを伝えよう</p>
              <textarea className="memo-ta" rows={3}
                placeholder={`例：この¥${amtNum.toLocaleString()}があれば...`}
                value={memo} onChange={e=>setMemo(e.target.value)}
                disabled={memoSaved}/>
              {memoSaved
                ?<p className="memo-saved">✅ メモを保存しました！</p>
                :<button className="btn-navy" onClick={saveMemo}>💾 メモを登録する</button>
              }
            </div>
            <button className="home-btn" style={{width:'100%'}} onClick={home}>ホームに戻る</button>
          </div>
        </div>
      )}
      {screen==='report'&&(
        <div className="screen fade-up">
          <div className="rep-body">
            <div className="rep-hdr">
              <button className="back-btn" style={{margin:0}} onClick={home}>＜ 戻る</button>
              <span style={{fontSize:16,fontWeight:900,color:NAVY}}>レポート</span>
              <div style={{width:48}}></div>
            </div>
            <div style={{background:'#fff8e8',borderRadius:22,padding:18,border:'2px solid rgba(234,179,8,.2)',marginBottom:14,textAlign:'center'}}>
              <PlantBox pct={achievePct} showBar={true}/>
              {goal.name&&(
                <p style={{fontSize:12,color:'#94a3b8',marginTop:8}}>
                  🎯 {goal.name} ¥{goal.amount.toLocaleString()} | 我慢総額 ¥{futureTotal.toLocaleString()} | <strong style={{color:NAVY}}>{achievePct.toFixed(1)}%達成</strong>
                </p>
              )}
              {isAchieved&&(
                <button className="next-goal-btn" style={{marginTop:12}} onClick={startNextGoal}>🌟 新たな目標を設定する</button>
              )}
            </div>
            <p className="rep-h">今月の感情バランス</p>
            <HeartChart ratio={satisfiedRatio}/>
            <div className="sum-card">
              <div className="sum-row"><span>😊 満足総額</span><span style={{color:YELLOW}}>¥{satisfiedTotal.toLocaleString()}</span></div>
              <div className="sum-row"><span>🌱 我慢総額</span><span style={{color:'#22c55e'}}>¥{futureTotal.toLocaleString()}</span></div>
              <div className="sum-row"><span>😟 後悔総額</span><span style={{color:NAVY}}>¥{regretTotal.toLocaleString()}</span></div>
              <div className="sum-row"><span style={{fontWeight:700}}>合計</span><span>¥{(satisfiedTotal+futureTotal+regretTotal).toLocaleString()}</span></div>
            </div>
            <p className="hist-h">📋 登録履歴（{records.length}件）</p>
            <div className="hist-list">
              {records.length===0&&<div className="empty-msg">まだ記録がありません</div>}
              {[...records].reverse().map(rec=>{
                const cat=CAT_MAP[rec.category]||null;
                const ec={satisfied:YELLOW,future:'#22c55e',regret:NAVY}[rec.emotion]||NAVY;
                const el={satisfied:'😊 満足',future:'🌱 我慢',regret:'😟 後悔'}[rec.emotion]||rec.emotion;
                return(
                  <div key={rec.id} className="hitem">
                    <div className="hitem-top">
                      <div className="hbadge"><span style={{color:ec}}>{el}</span></div>
                      <span className="hamt" style={{color:ec}}>¥{rec.amount.toLocaleString()}</span>
                    </div>
                    <div className="hmeta">
                      {cat&&<span>{cat.ico} {cat.label}</span>}
                      {rec.reason&&<span>💭 {rec.reason}</span>}
                      <span>📅 {rec.date}</span>
                    </div>
                    {rec.memo&&<div className="hmemo">📮 {rec.memo}</div>}
                  </div>
                );
              })}
            </div>
            {achieved.length>0&&(
              <div className="acv-section">
                <p className="acv-h">🏆 過去の達成記録（{achieved.length}件）</p>
                {achieved.map((a,i)=>(
                  <div key={i} className="acv-item">
                    <span className="acv-ico">🌻</span>
                    <div className="acv-info">
                      <div className="acv-name">{a.name}</div>
                      <div className="acv-meta">目標 ¥{a.amount.toLocaleString()} | 達成 {a.date}</div>
                    </div>
                    <span className="acv-amt">¥{a.saved.toLocaleString()}</span>
                    <button className="acv-del" onClick={()=>deleteAchieved(i)}>🗑</button>
                  </div>
                ))}
              </div>
            )}
            <button className="reset-btn" onClick={resetAll}>🗑️ すべてのデータをリセット</button>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
